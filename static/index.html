<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonus — Speak freely</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="app">

  <div class="app-header">
    <h1>Sonus</h1>
    <span class="subtitle">Multi-engine text-to-speech</span>
    <a href="/api-docs" target="_blank" style="margin-left:auto;font-size:0.8rem;color:var(--accent);text-decoration:none;white-space:nowrap">API Docs</a>
    <button class="btn btn-sm btn-ghost" style="margin-left:0.5rem" @click="$store.showInstall = true">Install Models</button>
  </div>

  <div class="panels">
    <voice-panel></voice-panel>
    <generate-form></generate-form>
    <output-panel></output-panel>
  </div>

  <curl-console></curl-console>

  <teleport to="body">
    <transition name="modal">
      <add-voice-modal v-if="$store.showAddVoice"></add-voice-modal>
    </transition>
    <transition name="modal">
      <params-modal v-if="$store.showParams"></params-modal>
    </transition>
    <transition name="modal">
      <install-modal v-if="$store.showInstall"></install-modal>
    </transition>
    <transition name="modal">
      <batch-detail-modal v-if="$store.showBatchDetail"></batch-detail-modal>
    </transition>
    <transition name="modal">
      <save-preset-modal v-if="$store.showSavePreset"></save-preset-modal>
    </transition>
  </teleport>

</div>

<!-- ── Component Templates ──────────────────────────────────────────────── -->

<script type="text/x-template" id="audio-player-template">
  <div class="item">
    <div class="player-main">
      <button class="player-play-btn" :class="{ playing: isCurrent }" @click="togglePlay" :title="playing ? 'Stop' : 'Play'">
        <span class="play-icon">&#9654;</span>
        <span class="stop-icon">&#9632;</span>
      </button>
      <div class="player-info">
        <div v-if="primaryLabel" class="player-title">{{ primaryLabel }}</div>
        <div v-else class="player-title">{{ item.name }}</div>
        <div v-if="primaryLabel" class="player-subtitle">{{ item.name }}</div>
        <div class="player-meta">{{ durStr }}{{ durStr && sizeStr ? ' \u00B7 ' : '' }}{{ sizeStr }}</div>
        <div class="player-date" v-if="dateStr">{{ dateStr }}</div>
      </div>
      <div class="player-actions">
        <a v-if="showDownload" class="player-dl" :href="item.url" download title="Download">&#x2193;</a>
        <button v-if="showRename" class="icon-btn" @click="$emit('rename', item.name)" title="Rename">&#9998;</button>
        <button v-if="showDetail" class="icon-btn" @click="$emit('detail', item)" title="Show details">&#9432;</button>
        <button v-if="showDelete" class="icon-btn danger" @click="$emit('delete', item.name)" title="Delete">&times;</button>
      </div>
    </div>
    <div class="player-seeker" v-if="seeker" @click="seek">
      <div class="seeker-equ">
        <div v-if="playing" class="wave-bars"><span v-for="i in 20" :key="i"></span></div>
        <div class="seeker-track">
          <div class="seeker-fill" :class="{ playing: playing }" :style="{ width: duration ? (currentTime / duration * 100) + '%' : '0%' }"></div>
        </div>
      </div>
      <span class="seeker-time">{{ formatTime(currentTime) }} / {{ formatTime(duration) }}</span>
    </div>
  </div>
</script>

<script type="text/x-template" id="voice-panel-template">
  <div class="panel">
    <div class="panel-header">
      <span>Custom Voices</span>
      <button class="btn btn-sm" @click="$store.showAddVoice = true">+ Add</button>
    </div>
    <div class="panel-body">
      <div v-if="!items.length" class="empty">No voice files yet.<br>Click "+ Add" to upload or record one.</div>
      <div v-for="v in items" :key="v.name">
        <template v-if="renaming && renaming.original === v.name">
          <div class="item">
            <div class="player-main">
              <input class="name-edit" v-model="renaming.current" @keydown.enter="submitRename" @keydown.escape="cancelRename" @blur="submitRename">
            </div>
          </div>
        </template>
        <audio-player v-else :item="v" show-rename show-delete @rename="startRename" @delete="deleteVoice"></audio-player>
      </div>
    </div>
    <div class="preset-section">
      <div class="preset-header">
        <span>Presets</span>
      </div>
      <div class="preset-body">
        <div v-if="!$store.presets.length" class="empty" style="padding:0.5rem 0;font-size:0.7rem">No presets saved yet.</div>
        <div v-for="p in $store.presets" :key="p.name" class="item" :title="p.preview">
          <template v-if="presetRenaming && presetRenaming.original === p.name">
            <div class="player-main">
              <input class="preset-name-edit" v-model="presetRenaming.current" @keydown.enter="submitPresetRename" @keydown.escape="cancelPresetRename" @blur="submitPresetRename" @click.stop>
            </div>
          </template>
          <template v-else>
            <div class="player-main">
              <div class="player-info preset-clickable" @click="applyPreset(p)">
                <div class="player-title">{{ p.name }}</div>
                <div class="player-meta">{{ p.preview }}</div>
              </div>
              <div class="player-actions">
                <button class="icon-btn" @click="startPresetRename(p.name)" title="Rename">&#9998;</button>
                <button class="icon-btn danger" @click="deletePreset(p.name)" title="Delete">&times;</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="output-panel-template">
  <div class="panel">
    <div class="panel-header">
      <span>Outputs</span>
      <button class="btn btn-sm btn-ghost" @click="clearOutputs" title="Delete all">Clear</button>
    </div>
    <div class="panel-filters" v-if="hasOutputs">
      <div class="filter-row">
        <select v-model="$store.filterState.engine">
          <option value="">Engine</option>
          <option v-for="e in engineOptions" :value="e">{{ e }}</option>
        </select>
        <select v-model="$store.filterState.model">
          <option value="">Model</option>
          <option v-for="m in modelOptions" :value="m">{{ m }}</option>
        </select>
      </div>
      <div class="filter-row">
        <select v-model="$store.filterState.time">
          <option value="">All time</option>
          <option value="5">Last 5 min</option>
          <option value="15">Last 15 min</option>
          <option value="30">Last 30 min</option>
          <option value="60">Last 1 hr</option>
          <option value="360">Last 6 hr</option>
          <option value="720">Last 12 hr</option>
          <option value="1440">Last 1 day</option>
          <option value="4320">Last 3 days</option>
          <option value="10080">Last 7 days</option>
        </select>
        <button class="btn btn-sm btn-ghost" style="font-size:0.65rem;padding:0.2rem 0.4rem" @click="clearFilters">Clear</button>
      </div>
    </div>
    <div class="panel-body">
      <div v-if="$store.outputsLoading" class="outputs-loading">
        <div class="soundwave-loader">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="outputs-loading-text">Loading outputs…</div>
      </div>
      <div v-else-if="!filtered.length" class="empty">No outputs match the current filters.</div>
      <div v-for="item in displayItems" :key="item._type === 'batch_summary' ? item.batchId : item.name">
        <template v-if="item._type === 'batch_summary'">
          <div class="batch-summary-card" @click="openBatchDetail(item)">
            <div class="batch-summary-main">
              <span class="batch-summary-arrow">&#9654;</span>
              <div class="batch-summary-info">
                <div class="batch-summary-title">{{ item.label }}</div>
                <div class="batch-summary-meta">{{ item.items.length }} file{{ item.items.length > 1 ? 's' : '' }} &#183; {{ batchTotalStr(item) }}</div>
              </div>
            </div>
          </div>
        </template>
        <audio-player v-else :item="item" show-detail show-delete @detail="showDetail" @delete="deleteOutput"></audio-player>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="generate-form-template">
  <div class="panel">
    <div class="panel-header"><span>Generate Speech</span></div>
    <div class="panel-body">
      <div class="mode-toggle">
        <div class="pill-indicator" :class="{ right: $store.batchMode }"></div>
        <button class="mode-btn" :class="{ active: !$store.batchMode }" @click="$store.batchMode = false" :disabled="!!$store.batchProgress">Single</button>
        <button class="mode-btn" :class="{ active: $store.batchMode }" @click="$store.batchMode = true" :disabled="!!$store.batchProgress">Batch</button>
      </div>
      <form @submit.prevent="$store.batchMode ? batchSubmit() : onSubmit()">
        <div class="form-group">
          <label for="text">Text *</label>
          <textarea id="text" v-model="$store.form.text" placeholder="Enter text to synthesize..." required></textarea>
        </div>

        <template v-if="!$store.batchMode">
          <div class="form-group">
            <label for="model">Model *</label>
            <select id="model" v-model="$store.form.model" @change="onModelChange" required>
              <option value="">— Select a model —</option>
              <optgroup v-for="engine in sortedEngines" :label="engineLabel(engine)">
                <option v-for="m in groupedModels[engine]" :value="m.id" :disabled="!m.available">
                  {{ m.name }}{{ capsLabel(m) }}{{ unavailLabel(m) }}
                </option>
              </optgroup>
            </select>
            <div class="voice-hint" v-if="modelDesc">{{ modelDesc }}</div>
            <div class="voice-hint" v-if="modelLangs.length">Languages: {{ modelLangs.join(', ') }}</div>
          </div>

          <div v-if="capabilities.includes('speaker') && !capabilities.includes('voice_blend')" class="form-group voice-field">
            <label for="speaker_name">Speaker Name</label>
            <select id="speaker_name" v-model="$store.form.speaker_name">
              <option value="">— Select a voice —</option>
              <option v-for="v in modelVoices.built_in" :value="v">{{ v }}</option>
            </select>
          </div>

          <div v-if="capabilities.includes('voice_blend')" class="form-group voice-field">
            <label>Voice</label>
            <div class="mode-toggle blend-toggle">
              <div class="pill-indicator" :class="{ right: $store.blendMode }"></div>
              <button class="mode-btn" :class="{ active: !$store.blendMode }" @click="$store.blendMode = false" type="button">Single</button>
              <button class="mode-btn" :class="{ active: $store.blendMode }" @click="$store.blendMode = true" type="button">Blend</button>
            </div>
            <select v-if="!$store.blendMode" v-model="$store.form.speaker_name">
              <option value="">— Select a voice —</option>
              <option v-for="v in modelVoices.built_in" :value="v">{{ v }}</option>
            </select>
            <template v-else>
              <div class="voice-blend-summary" v-if="blendVoicesCount">
                <code>{{ blendVoiceString }}</code>
              </div>
              <div class="model-grid blend-grid">
                <div v-for="(v, i) in modelVoices.built_in" :key="v" class="model-card" :style="{ '--i': i }"
                  :class="{ selected: isBlendSelected(v) }" @click="toggleBlendVoice(v)">
                  <input type="checkbox" :checked="isBlendSelected(v)" @click.stop>
                  <span class="model-name">{{ v }}</span>
                  <input v-if="isBlendSelected(v)" type="number" class="blend-weight-input" min="0" max="1" step="0.01"
                    :value="getBlendWeight(v)" @input.stop="setBlendWeight(v, parseFloat($event.target.value))" @click.stop>
                </div>
              </div>
              <div class="model-select-actions" v-if="modelVoices.built_in.length">
                <button type="button" @click="selectAllBlendVoices">Select all</button>
                <button type="button" @click="$store.blendSelections = {}">Clear</button>
              </div>
              <div class="voice-hint" v-if="!blendVoicesCount">Select at least one voice to blend. Equal weights when omitted.</div>
            </template>
          </div>

          <div v-if="capabilities.includes('voice_prompt')" class="form-group voice-field">
            <label for="voice_description">Voice Description</label>
            <textarea id="voice_description" v-model="$store.form.voice_description" placeholder="Describe the voice..." rows="2"></textarea>
          </div>

          <div v-if="capabilities.includes('voice_clone')" class="form-group voice-field">
            <label for="sample_voice_file">Sample Voice File</label>
            <select id="sample_voice_file" v-model="$store.form.sample_voice_file">
              <option value="">— Select a voice file —</option>
              <option v-for="v in modelVoices.cloneable" :value="v">{{ v }}</option>
            </select>
          </div>
        </template>

        <template v-if="$store.batchMode">
          <div class="tab-bar">
            <button v-for="tab in batchTabs" :key="tab.key"
              class="tab-btn" :class="{ active: $store.batchTab === tab.key }"
              @click="switchBatchTab(tab.key)" type="button">
              {{ tab.label }}
            </button>
          </div>

          <!-- Voice Clone tab -->
          <template v-if="$store.batchTab === 'clone'">
            <div class="form-group">
              <label>Models ({{ cloneBatchLabel }})</label>
              <div class="model-grid">
                <div v-for="(m, i) in cloneModels" :key="m.id" class="model-card" :style="{ '--i': i }" :class="{ selected: $store.selectedBatchModels.includes(m.id) }" @click="toggleBatchModel(m.id)">
                  <input type="checkbox" :checked="$store.selectedBatchModels.includes(m.id)" @click.stop>
                  <span class="model-name">{{ m.name }}</span>
                </div>
              </div>
              <div class="model-select-actions">
                <button type="button" @click="selectAllVisible">Select all</button>
                <button type="button" @click="clearSelected">Clear</button>
              </div>
            </div>
            <div class="form-group voice-field">
              <label for="b_clone_voice">Sample Voice File</label>
              <select id="b_clone_voice" v-model="$store.form.sample_voice_file">
                <option value="">— Select a voice file —</option>
                <option v-for="v in allCloneableVoices" :value="v">{{ v }}</option>
              </select>
            </div>
          </template>

          <!-- Voice Prompt tab -->
          <template v-if="$store.batchTab === 'prompt'">
            <div class="form-group">
              <label>Models ({{ promptBatchLabel }})</label>
              <div class="model-grid">
                <div v-for="(m, i) in promptModels" :key="m.id" class="model-card" :style="{ '--i': i }" :class="{ selected: $store.selectedBatchModels.includes(m.id) }" @click="toggleBatchModel(m.id)">
                  <input type="checkbox" :checked="$store.selectedBatchModels.includes(m.id)" @click.stop>
                  <span class="model-name">{{ m.name }}</span>
                </div>
              </div>
              <div class="model-select-actions">
                <button type="button" @click="selectAllVisible">Select all</button>
                <button type="button" @click="clearSelected">Clear</button>
              </div>
            </div>
            <div class="form-group voice-field">
              <label for="b_prompt_voice">Voice Description</label>
              <textarea id="b_prompt_voice" v-model="$store.form.voice_description" placeholder="Describe the voice..." rows="2"></textarea>
            </div>
          </template>

          <!-- Multi-Voice tab -->
          <template v-if="$store.batchTab === 'multivoice'">
            <div class="form-group">
              <label for="b_mv_model">Model</label>
              <select id="b_mv_model" v-model="$store.multivoiceModel">
                <option value="">— Select a model —</option>
                <optgroup v-for="eng in speakerEngineNames" :key="eng" :label="engineLabel(eng)">
                  <option v-for="m in speakerModelsByEngine[eng]" :key="m.id" :value="m.id">{{ m.name }}</option>
                </optgroup>
              </select>
            </div>
            <div class="form-group" v-if="multivoiceVoices.length">
              <label>Voices ({{ multivoiceSelectedCount }} selected)</label>
              <div class="model-grid">
                <div v-for="(v, i) in multivoiceVoices" :key="v" class="model-card" :style="{ '--i': i }"
                  :class="{ selected: $store.multivoiceSelectedVoices.includes(v) }"
                  @click="toggleMultivoiceVoice(v)">
                  <input type="checkbox" :checked="$store.multivoiceSelectedVoices.includes(v)" @click.stop>
                  <span class="model-name">{{ v }}</span>
                </div>
              </div>
              <div class="model-select-actions">
                <button type="button" @click="selectAllVoices">Select all</button>
                <button type="button" @click="$store.multivoiceSelectedVoices = []">Clear</button>
              </div>
            </div>
            <div class="voice-hint" v-if="!$store.multivoiceModel">
              Select a speaker model to choose voices.
            </div>
            <div class="voice-hint" v-else-if="!multivoiceVoices.length">
              No built-in voices for this model.
            </div>
          </template>

          <div class="form-group">
            <label for="batch_gap">Delay between generations (ms)</label>
            <input type="number" id="batch_gap" v-model.number="$store.batchGapMs" min="500" max="10000" step="100">
          </div>
        </template>

        <div class="advanced-section">
          <button class="advanced-toggle" :class="{ open: $store.showAdvanced }" @click="$store.showAdvanced = !$store.showAdvanced" type="button">
            <span class="advanced-arrow">&#9654;</span>
            <span>Advanced</span>
            <span class="advanced-summary" v-if="!$store.showAdvanced">{{ advancedSummary }}</span>
          </button>
          <div class="advanced-body" :class="{ open: $store.showAdvanced }">
            <div class="range-row" style="margin-bottom:0.75rem">
              <div class="form-group">
                <label for="adv_speed">Speed</label>
                <input type="range" id="adv_speed" min="0.25" max="4.0" step="0.25" v-model.number="$store.form.speed">
                <div class="range-label"><span>0.25x</span><span>{{ Number($store.form.speed).toFixed(2) }}x</span><span>4.0x</span></div>
              </div>
            </div>
            <div class="range-row">
              <div class="form-group" v-if="capabilities.includes('temperature')">
                <label for="adv_temperature">Temperature</label>
                <input type="range" id="adv_temperature" min="0" max="2" step="0.1" v-model.number="$store.form.temperature">
                <div class="range-label"><span>0</span><span>{{ Number($store.form.temperature).toFixed(1) }}</span><span>2</span></div>
              </div>
              <div class="form-group">
                <label for="adv_seed">Seed (blank = random)</label>
                <input type="number" id="adv_seed" placeholder="Random" min="0" v-model.number="$store.form.seed">
              </div>
            </div>
            <div class="range-row" v-if="capabilities.includes('emotion')">
              <div class="form-group">
                <label for="adv_exaggeration">Exaggeration (emotion)</label>
                <input type="range" id="adv_exaggeration" min="0" max="1" step="0.05" v-model.number="$store.form.exaggeration">
                <div class="range-label"><span>0</span><span>{{ Number($store.form.exaggeration).toFixed(2) }}</span><span>1</span></div>
              </div>
              <div class="form-group">
                <label for="adv_cfg_weight">CFG Weight</label>
                <input type="range" id="adv_cfg_weight" min="0" max="1" step="0.05" v-model.number="$store.form.cfg_weight">
                <div class="range-label"><span>0</span><span>{{ Number($store.form.cfg_weight).toFixed(2) }}</span><span>1</span></div>
                <div class="voice-hint">&gt; 0.5 may truncate</div>
              </div>
            </div>
            <div class="checkbox-group" v-if="modelEngine === 'kokoro'" style="margin-top:0.25rem">
              <input type="checkbox" id="adv_add_pauses" v-model="$store.form.add_pauses">
              <label for="adv_add_pauses">Punctuation pauses</label>
            </div>
            <div class="e2e-section">
              <div class="checkbox-group">
                <input type="checkbox" id="e2e_enabled" v-model="$store.e2eEnabled" :disabled="!hasAvailSttModel">
                <label for="e2e_enabled">Validate with STT (transcribe &amp; compare)</label>
              </div>
              <template v-if="$store.e2eEnabled">
                <div class="form-group">
                  <label for="e2e_model">STT Model</label>
                  <select id="e2e_model" v-model="$store.e2eModel">
                    <option v-for="m in $store.e2eModels" :key="m.id" :value="m.id" :disabled="!m.available">
                      {{ m.name }}{{ m.available ? '' : ' [install]' }}
                    </option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="e2e_language">Language (optional)</label>
                  <input type="text" id="e2e_language" v-model="$store.e2eLanguage" placeholder="e.g. en">
                </div>
              </template>
            </div>
          </div>
        </div>

        <div class="generate-row">
          <button type="button" class="btn btn-ghost btn-sm save-preset-btn" @click="$store.showSavePreset = true" :disabled="$store.loading" title="Save current config as a preset">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save as Preset
          </button>
          <button type="submit" class="btn" :class="[{ loading: $store.loading }, btnState]" :disabled="$store.loading || batchSubmitDisabled">
            <span class="spinner"></span>
            {{ batchSubmitLabel }}
          </button>
        </div>

        <div class="batch-progress" v-if="$store.batchProgress">
          <div class="progress-bar">
            <div class="progress-fill" :style="{ width: ($store.batchProgress.current / $store.batchProgress.total * 100) + '%' }"></div>
          </div>
          <div class="progress-label">
            <span>{{ $store.batchProgress.current }} / {{ $store.batchProgress.total }} — {{ $store.batchProgress.modelName }}</span>
            <button type="button" class="btn btn-sm btn-ghost" @click="cancelBatch" style="font-size:0.6rem;padding:0.1rem 0.4rem">Cancel</button>
          </div>
        </div>

        <transition name="slide">
          <div v-if="$store.batchSummary" class="batch-summary" :class="$store.batchSummary.type">
            {{ $store.batchSummary.message }}
            <div class="batch-summary-detail" v-if="$store.batchSummary.detail">{{ $store.batchSummary.detail }}</div>
          </div>
        </transition>

        <transition name="slide">
          <div class="status-msg" :class="genStatusClass" v-if="genStatus && !$store.batchProgress">{{ genStatus }}</div>
        </transition>
      </form>
    </div>
  </div>
</script>

<script type="text/x-template" id="curl-console-template">
  <div class="curl-console">
    <button class="curl-toggle" :class="{ open: $store.curlOpen }" @click="$store.curlOpen = !$store.curlOpen">
      <span class="curl-arrow">&#9654;</span>
      <span class="curl-label">{{ $store.curlOpen ? 'Hide' : 'Show' }} curl</span>
      <span class="curl-badge" :style="curlStyle">{{ curlReady ? 'ready' : 'waiting' }}</span>
    </button>
    <div class="curl-body" :class="{ open: $store.curlOpen }">
      <pre><code>{{ curlText }}</code></pre>
      <div class="curl-actions">
        <button class="btn btn-sm btn-ghost curl-copy-btn" @click="copyCurl">Copy</button>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="add-voice-modal-template">
  <div class="modal-overlay" @click.self="close">
    <div class="modal add-voice-modal">
      <div class="modal-header">
        <h2>Add Voice</h2>
      </div>
      <div class="modal-body">
        <template v-if="!stagedFile">
          <div class="modal-tabs">
            <button class="modal-tab" :class="{ active: activeTab === 'upload' }" @click="switchTab('upload')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload File
            </button>
            <button class="modal-tab" :class="{ active: activeTab === 'record' }" @click="switchTab('record')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              Record Audio
            </button>
          </div>

          <div v-if="activeTab === 'upload'">
            <form @submit.prevent="uploadSubmit">
              <input type="file" ref="fileInput" accept="audio/*,.wav,.mp3,.m4a,.ogg,.webm" @change="uploadFile = $event.target.files[0]" hidden>
              <div class="upload-zone" :class="{ 'has-file': uploadFile }" @click="$refs.fileInput.click()">
                <template v-if="!uploadFile">
                  <svg class="upload-zone-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  <span class="upload-zone-label">Click to select audio file</span>
                  <span class="upload-hint">WAV, MP3, M4A, OGG, WebM &mdash; any format</span>
                </template>
                <template v-else>
                  <svg class="upload-zone-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  <span class="upload-zone-label">{{ uploadFile.name }}</span>
                </template>
              </div>
              <div class="upload-name-row">
                <input type="text" id="voice-name" v-model="uploadName" placeholder="Voice name (optional, defaults to filename)">
                <button type="submit" class="btn" id="upload-btn">Upload</button>
              </div>
              <div class="status-msg" :class="uploadStatusClass" v-if="uploadStatus">{{ uploadStatus }}</div>
            </form>
          </div>

          <div v-if="activeTab === 'record'" class="record-section">
            <div class="record-btn-wrap">
              <button type="button" class="record-btn" :class="{ recording }" @click="recording ? stopRecording() : startRecording()">
                <template v-if="!recording">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
                </template>
                <template v-else>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                </template>
              </button>
              <span class="record-label">{{ recording ? 'Recording...' : 'Click to record' }}</span>
            </div>
            <div class="wave-container" v-show="recording">
              <canvas id="recording-wave" ref="waveCanvas" width="380" height="60"></canvas>
            </div>
            <div class="record-form-fields">
              <div class="form-group">
                <label for="voice-name-record">Voice name</label>
                <input type="text" id="voice-name-record" v-model="recordName" placeholder="Leave blank for a generated name" :disabled="recording">
              </div>
            </div>
            <div class="status-msg" :class="recordStatusClass" v-if="recordStatus">{{ recordStatus }}</div>
          </div>
        </template>

        <template v-else>
          <div class="staged-card">
            <div class="staged-header">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              <span>{{ stagedFile.name.replace('.wav', '') }}</span>
            </div>
            <div class="staged-meta">
              <span class="staged-meta-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                {{ stagedFile.duration }}s
              </span>
              <span class="staged-meta-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                {{ (stagedFile.size / 1024).toFixed(0) }} KB
              </span>
              <span class="staged-meta-badge staged-meta-badge-accent">WAV</span>
            </div>
            <div class="staged-player">
              <div class="staged-player-main">
                <button class="player-play-btn" :class="{ playing: playing && $store.currentName === stagedFile.name }" @click="togglePlayer" :title="playing ? 'Stop' : 'Play'">
                  <span class="play-icon">&#9654;</span>
                  <span class="stop-icon">&#9632;</span>
                </button>
                <div class="staged-player-info">
                  <div class="staged-player-name">{{ stagedFile.name.replace('.wav', '') }}</div>
                  <div class="staged-player-meta">{{ stagedFile.duration }}s</div>
                </div>
              </div>
              <div class="player-seeker" v-if="seeker" @click="seekPlayer">
                <div class="seeker-equ">
                  <div v-if="playing" class="wave-bars"><span v-for="i in 20" :key="i"></span></div>
                  <div class="seeker-track">
                    <div class="seeker-fill" :class="{ playing: playing }" :style="{ width: duration ? (currentTime / duration * 100) + '%' : '0%' }"></div>
                  </div>
                </div>
                <span class="seeker-time">{{ formatTime(currentTime) }} / {{ formatTime(duration) }}</span>
              </div>
            </div>
            <div v-if="stageTranscription" class="staged-transcript-box">
              <div class="staged-transcript-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
                <span>Transcription</span>
              </div>
              <textarea class="staged-transcript" readonly>{{ stageTranscription }}</textarea>
            </div>
            <div class="staged-actions">
              <button type="button" class="btn btn-ghost" @click="discardStage">Discard</button>
              <button type="button" class="btn btn-secondary" @click="transcribeStage" :disabled="stageTranscribing || !hasAvailableStt" :title="!hasAvailableStt ? 'No STT model installed. Install a Whisper model first.' : ''">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                {{ stageTranscribing ? 'Transcribing...' : 'Transcribe' }}
              </button>
              <button type="button" class="btn" @click="saveStage" :disabled="stageSaving">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                {{ stageSaving ? 'Saving...' : 'Save Voice' }}
              </button>
            </div>
          </div>
        </template>
      </div>
      <div class="modal-footer" v-if="!stagedFile">
        <button class="btn btn-ghost" @click="close">Close</button>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="params-modal-template">
  <div class="modal-overlay" @click.self="close">
    <div class="modal params-modal">
      <div class="modal-header">
        <h2>Generation Details</h2>
      </div>
      <div class="modal-body">
        <div v-if="out">
          <div class="params-player">
            <audio-player :item="out" show-download show-delete @delete="deleteOut"></audio-player>
          </div>
          <div v-if="out.params.e2e" class="e2e-result" :class="e2eResultClass(out.params.e2e.similarity)">
            <span class="e2e-score">{{ (out.params.e2e.similarity * 100).toFixed(1) }}%</span>
            <span class="e2e-wer">WER {{ (out.params.e2e.wer * 100).toFixed(1) }}%</span>
            <span class="e2e-detail" :title="out.params.e2e.transcription">{{ out.params.e2e.transcription }}</span>
          </div>
          <div class="params-content">
            <template v-for="(val, key) in out.params" :key="key">
              <div class="params-field" v-if="key !== 'e2e'">
                <div class="params-label">{{ key }}</div>
                <div class="params-value" :class="{ 'long-text': String(val).length > 80 }">{{ val }}</div>
              </div>
            </template>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" @click="close">Close</button>
        <button class="btn" @click="fillForm">Regenerate</button>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="install-modal-template">
  <div class="modal-overlay install-modal" @click.self="close">
    <div class="modal">
      <div class="modal-header">
        <h2>Install Models</h2>
      </div>
      <div class="modal-body">
        <div v-if="!engineNames.length" class="empty">No install information available.</div>
        <div v-for="eng in engineNames" :key="eng" class="install-group">
          <h3>{{ eng }}</h3>
          <div v-for="item in groups[eng]" :key="item.id" class="install-card">
            <div class="install-card-header">
              <span class="install-status" :class="item.available ? 'available' : 'missing'">
                {{ item.available ? '\u2713' : '\u2717' }}
              </span>
              <span class="install-name">{{ item.name }}</span>
              <span class="install-size" v-if="item.size">{{ item.size }}</span>
            </div>
            <div class="install-desc" v-if="item.description">{{ item.description }}</div>
            <div class="install-cmd" v-for="cmd in (item.install ? item.install.commands : [])" :key="cmd">
              <code @click="copyCmd(cmd)">{{ cmd }}</code>
              <button class="install-copy" @click="copyCmd(cmd)">Copy</button>
            </div>
            <template v-if="item.install_s3_tokenizer">
              <div class="install-extra-note">{{ item.install_s3_tokenizer.message }}</div>
              <div class="install-cmd" v-for="cmd in (item.install_s3_tokenizer.commands || [])" :key="cmd">
                <code @click="copyCmd(cmd)">{{ cmd }}</code>
                <button class="install-copy" @click="copyCmd(cmd)">Copy</button>
              </div>
            </template>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" @click="close">Close</button>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="batch-detail-modal-template">
  <div class="modal-overlay" @click.self="close">
    <div class="modal batch-detail-modal">
      <div class="bd-header">
        <h2>{{ modalTitle }}</h2>
        <div class="bd-info">
          <div class="bd-info-row" v-if="sharedText">
            <span class="bd-label">Prompt:</span>
            <span class="bd-value">{{ sharedText }}</span>
          </div>
          <div class="bd-info-row" v-if="singularInfo">
            <span class="bd-label">{{ singularInfo.label }}:</span>
            <span class="bd-value">{{ singularInfo.value }}</span>
          </div>
          <div class="bd-info-row">
            <span class="bd-label">Generated:</span>
            <span class="bd-value">{{ totalGenerated }}</span>
          </div>
        </div>
      </div>

      <div class="batch-detail-body">
        <div v-for="item in $store.batchDetailItems" :key="item.name" class="bd-item">
          <audio-player :item="item" :primary-label="itemDiff(item)" show-download show-delete @delete="deleteItem"></audio-player>
          <div v-if="item.params && item.params.e2e" class="e2e-result" :class="e2eResultClass(item.params.e2e.similarity)">
            <span class="e2e-score">{{ (item.params.e2e.similarity * 100).toFixed(1) }}%</span>
            <span class="e2e-wer">WER {{ (item.params.e2e.wer * 100).toFixed(1) }}%</span>
            <span class="e2e-detail" :title="item.params.e2e.transcription">{{ item.params.e2e.transcription }}</span>
          </div>
        </div>
      </div>

      <div class="bd-footer">
        <button class="btn btn-ghost" @click="close">Close</button>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="save-preset-modal-template">
  <div class="modal-overlay" @click.self="close">
    <div class="modal save-preset-modal">
      <div class="modal-header">
        <h2>Save Preset</h2>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="save-preset-name">Preset name</label>
          <input type="text" id="save-preset-name" v-model="presetName" placeholder="Leave blank for auto-generated name" @keydown.enter="save" ref="nameInput">
        </div>
        <div class="preset-save-preview">
          <div class="preset-save-preview-label">Will save:</div>
          <div class="preset-save-preview-text">{{ preview }}</div>
        </div>
        <div class="status-msg" :class="statusClass" v-if="status">{{ status }}</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" @click="close">Cancel</button>
        <button type="button" class="btn" @click="save" :disabled="saving">{{ saving ? 'Saving...' : 'Save Preset' }}</button>
      </div>
    </div>
  </div>
</script>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="/js/store.js"></script>
<script src="/js/components.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
